# Backend config — single source of truth for sim params.
# All defaults are labeled stand-ins; non-obvious ones have a vault/Decisions note.

sim:
  tick_period_s: 1.0        # real seconds per tick (watchable demo cadence)
  ticks_per_day: 96         # 15-min market intervals -> 96 ticks = one sim day
  max_ticks: 0              # 0 = run forever; >0 = stop after N ticks (tests)

mqtt:
  host: localhost
  port: 1883

websocket:
  host: localhost
  port: 8765

nodes:
  solar:   { id: PV_01,       inverter_kw: 80.0 }
  battery: { id: BESS_01,     capacity_kwh: 100.0, soc_init: 0.60, soc_floor: 0.20, max_power_kw: 50.0 }
  load:    { id: LOAD_CAMPUS, peak_kw: 120.0, base_kw: 40.0, critical_fraction: 0.40, noise_kw: 5.0 }

degradation:                # empirical stand-ins (NOT a specific cell datasheet)
  b0: 5.0e-5                # capacity-loss intercept (dimensionless)
  b1: 1.0e-4                # per-unit avg SoC
  b2: 2.0e-3               # per-(unit DoD)^2 — chosen so the quadratic term dominates deep swings
  c_new_per_kwh: 150.0      # USD/kWh replacement cost of new capacity
  floor_price: 0.02         # USD/kWh price floor
  margin: 0.005             # USD/kWh ask markup over marginal cost

ridge:                      # online recursive ridge forecast (Agent B)
  alpha: 1.0                # P0 = (1/alpha) I_d
  forgetting: 0.99          # f in (0,1]; adaptive but stable (~100-tick memory)
  cond_check_every: 20      # ticks between condition watchdog runs
  cond_max: 1.0e8           # condition-number threshold to re-anchor
  buffer_k: 96              # rolling re-anchor window (one sim day)
  pred_hard_cap_kw: 500.0   # rail-4 upper physical clamp
  horizon_ticks: 5          # forecast lookahead

network:
  lines:
    FEEDER_1: { rating_kw: 80.0 }   # deliberately < peak demand so curtailment triggers

heartbeat:
  miss_threshold: 3         # missed heartbeats before CRITICAL
  clear_consecutive: 2      # consecutive good beats to clear (anti-flap)

chaos:
  kill_tick: 200            # auto-kill solar at this tick (0 = manual only)
  revive_tick: 260          # auto-restore at this tick (0 = manual only)
  target: PV_01
